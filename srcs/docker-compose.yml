version: "3.9"

services:
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    depends_on:
      - wordpress
      - mariadb
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    networks:
      inception:
    restart: unless-stopped

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    env_file:
      - ../secrets/.env
    depends_on:
      - mariadb
    volumes:
      - wp_data:/var/www/html
    networks:
      inception:
    restart: unless-stopped

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    env_file:
      - ../secrets/.env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      inception:
    restart: unless-stopped

networks:
  inception:

volumes:
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR}/wp

  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR}/db